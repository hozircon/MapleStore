<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('商品搜尋')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid py-3">
  <div class="row g-3">

    <!-- ===== Left: Filter Panel (20%) ===== -->
    <div class="col-12 col-lg-2 col-md-3">
      <div class="ms-filter-card p-3">
        <h6 class="ms-panel-title">搜尋與篩選</h6>
        <form id="searchForm" th:action="@{/}" method="get">

          <!-- Keyword -->
          <div class="mb-3">
            <label class="form-label small fw-semibold">關鍵字</label>
            <div class="position-relative">
              <input type="text" id="keywordInput" class="form-control form-control-sm"
                     name="keyword" autocomplete="off"
                     th:value="${searchRequest.keyword}"
                     placeholder="輸入商品名稱…" />
              <div id="keywordDropdown"
                   class="dropdown-menu w-100 shadow-sm p-0"
                   style="display:none; max-height:220px; overflow-y:auto; position:absolute; z-index:1050;"></div>
            </div>
          </div>

          <!-- Category -->
          <div class="mb-3">
            <label class="form-label small fw-semibold">分類</label>
            <select id="categorySelect" class="form-select form-select-sm" name="category">
              <option value="">-- 全部 --</option>
              <option th:each="cat : ${categories}"
                      th:value="${cat.name()}"
                      th:text="${cat.label}"
                      th:selected="${searchRequest.category == cat.name()}">
              </option>
            </select>
          </div>

          <!-- Currency checkboxes -->
          <div class="mb-3">
            <label class="form-label small fw-semibold">貨幣</label>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="priceTypes" value="MESO" id="pt-MESO"
                     th:checked="${searchRequest.priceTypes == null
                                  or searchRequest.priceTypes.isEmpty()
                                  or #lists.contains(searchRequest.priceTypes, 'MESO')}" />
              <label class="form-check-label small" for="pt-MESO">楓幣</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="priceTypes" value="CS" id="pt-CS"
                     th:checked="${searchRequest.priceTypes == null
                                  or searchRequest.priceTypes.isEmpty()
                                  or #lists.contains(searchRequest.priceTypes, 'CS')}" />
              <label class="form-check-label small" for="pt-CS">CS</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="priceTypes" value="WS" id="pt-WS"
                     th:checked="${searchRequest.priceTypes == null
                                  or searchRequest.priceTypes.isEmpty()
                                  or #lists.contains(searchRequest.priceTypes, 'WS')}" />
              <label class="form-check-label small" for="pt-WS">WS</label>
            </div>
          </div>

          <!-- Equipment advanced filters (shown/hidden by JS) -->
          <div id="equipmentFilters" class="mb-3" style="display:none;">
            <label class="form-label small fw-semibold">裝備進階篩選</label>

            <!-- 種類 select -->
            <div class="mb-2">
              <select id="equipTypeSelect" class="form-select form-select-sm" name="equipType">
                <option value="">-- 種類：全部 --</option>
                <option value="防具" th:selected="${searchRequest.equipType == '防具'}">防具</option>
                <option value="武器" th:selected="${searchRequest.equipType == '武器'}">武器</option>
                <option value="其他" th:selected="${searchRequest.equipType == '其他'}">其他（坐騎/寵物）</option>
              </select>
            </div>

            <!-- 子分類 select（由 JS 動態填入） -->
            <div class="mb-2">
              <select id="equipSubTypeSelect" class="form-select form-select-sm" name="equipSubType">
                <option value="">-- 子分類：全部 --</option>
              </select>
            </div>

            <div class="row g-1">
              <div class="col-6">
                <input type="number" class="form-control form-control-sm" name="strMin"
                       min="0" placeholder="STR ≥"
                       th:value="${searchRequest.strMin}" />
              </div>
              <div class="col-6">
                <input type="number" class="form-control form-control-sm" name="dexMin"
                       min="0" placeholder="DEX ≥"
                       th:value="${searchRequest.dexMin}" />
              </div>
              <div class="col-6">
                <input type="number" class="form-control form-control-sm" name="intMin"
                       min="0" placeholder="INT ≥"
                       th:value="${searchRequest.intMin}" />
              </div>
              <div class="col-6">
                <input type="number" class="form-control form-control-sm" name="lukMin"
                       min="0" placeholder="LUK ≥"
                       th:value="${searchRequest.lukMin}" />
              </div>
              <div class="col-6">
                <input type="number" class="form-control form-control-sm" name="atkMin"
                       min="0" placeholder="ATK ≥"
                       th:value="${searchRequest.atkMin}" />
              </div>
              <div class="col-6">
                <input type="number" class="form-control form-control-sm" name="matkMin"
                       min="0" placeholder="MATK ≥"
                       th:value="${searchRequest.matkMin}" />
              </div>
              <div class="col-12">
                <input type="number" class="form-control form-control-sm" name="scrollSlotsMin"
                       min="0" placeholder="卷次 ≥"
                       th:value="${searchRequest.scrollSlotsMin}" />
              </div>
            </div>
          </div>

          <!-- Sub-category filter: CONSUMABLE -->
          <div id="subCatConsumable" class="mb-3" style="display:none;">
            <label class="form-label small fw-semibold">子類別</label>
            <select class="form-select form-select-sm" name="subCategory" id="subCatConsumableSelect">
              <option value="">-- 全部 --</option>
              <option value="藥水"     th:selected="${searchRequest.subCategory == '藥水'}">藥水</option>
              <option value="卷軸"     th:selected="${searchRequest.subCategory == '卷軸'}">卷軸</option>
              <option value="技能書"   th:selected="${searchRequest.subCategory == '技能書'}">技能書</option>
              <option value="箭矢/飛鏢" th:selected="${searchRequest.subCategory == '箭矢/飛鏢'}">箭矢/飛鏢</option>
              <option value="其他"     th:selected="${searchRequest.subCategory == '其他'}">其他</option>
            </select>
          </div>

          <!-- Sub-category filter: OTHER -->
          <div id="subCatOther" class="mb-3" style="display:none;">
            <label class="form-label small fw-semibold">子類別</label>
            <select class="form-select form-select-sm" name="subCategory" id="subCatOtherSelect">
              <option value="">-- 全部 --</option>
              <option value="礦石" th:selected="${searchRequest.subCategory == '礦石'}">礦石</option>
              <option value="素材" th:selected="${searchRequest.subCategory == '素材'}">素材</option>
            </select>
          </div>

          <button type="submit" class="btn btn-primary btn-sm w-100">搜尋</button>
        </form>
      </div>
    </div><!-- /col filter -->

    <!-- ===== Right: Result Panel (80%) ===== -->
    <div class="col-12 col-lg-10 col-md-9">

      <!-- Not searched yet -->
      <div th:unless="${searched}" class="ms-empty-hint text-center py-5 mt-2">
        <p class="fs-5 mb-1" style="color:var(--ms-text-muted);">請輸入條件後點擊搜尋</p>
        <p class="small mb-0">可依關鍵字、分類、貨幣或裝備屬性篩選商品</p>
      </div>

      <th:block th:if="${searched}">

      <!-- Result summary -->
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="mb-0 text-muted">
          搜尋結果
          <span class="badge bg-secondary" th:text="${totalCount}">0</span> 筆
        </h6>
      </div>

      <!-- Empty state -->
      <div th:unless="${hasResults}" class="alert alert-secondary text-center py-4">
        <p class="mb-1 fs-5">😞 找不到符合條件的商品</p>
        <p class="mb-0 small text-muted">請嘗試更改關鍵字或放寬篩選條件</p>
      </div>

      <!-- Results list -->
      <div th:if="${hasResults}">

        <!-- Equipment table -->
        <div th:if="${#lists.size(items.?[category.name() == 'EQUIPMENT']) > 0}">
          <div style="overflow-x:auto;">
          <table id="equipTable" class="table table-sm table-hover table-bordered ms-table align-middle mb-0">
            <thead>
              <tr style="height:40px;">
                <th class="text-center sort-header" data-col="name" style="white-space:nowrap;min-width:160px;">道具名稱<span class="sort-ind"></span></th>
                <th class="text-center sort-header" data-col="str" style="white-space:nowrap;">力量 <small class="text-muted fw-normal">STR</small><span class="sort-ind"></span></th>
                <th class="text-center sort-header" data-col="dex" style="white-space:nowrap;">敏捷 <small class="text-muted fw-normal">DEX</small><span class="sort-ind"></span></th>
                <th class="text-center sort-header" data-col="int" style="white-space:nowrap;">智力 <small class="text-muted fw-normal">INT</small><span class="sort-ind"></span></th>
                <th class="text-center sort-header" data-col="luk" style="white-space:nowrap;">幸運 <small class="text-muted fw-normal">LUK</small><span class="sort-ind"></span></th>
                <th class="text-center sort-header" data-col="atk" style="white-space:nowrap;">攻擊力 <small class="text-muted fw-normal">ATK</small><span class="sort-ind"></span></th>
                <th class="text-center sort-header" data-col="matk" style="white-space:nowrap;">魔法攻擊 <small class="text-muted fw-normal">MATK</small><span class="sort-ind"></span></th>
                <th class="text-center sort-header" data-col="slots" style="white-space:nowrap;">卷軸次數<span class="sort-ind"></span></th>
                <th style="white-space:nowrap;min-width:100px;">其他素質</th>
                <th class="text-center sort-header" data-col="price" style="white-space:nowrap;">價格<span class="sort-ind"></span></th>
                <th class="text-center" style="white-space:nowrap;">賣家・位置</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <th:block th:each="item : ${items}" th:if="${item.category.name() == 'EQUIPMENT'}">
                <tr th:replace="~{fragments/item-equipment-row :: equipmentRow(${item})}"></tr>
              </th:block>
            </tbody>
          </table>
          </div><!-- /overflow-x:auto -->
        </div>

        <!-- General item rows (table) -->
        <div th:if="${#lists.size(items.?[category.name() != 'EQUIPMENT']) > 0}">
          <div style="overflow-x:auto;">
          <table id="generalTable" class="table table-sm table-hover table-bordered ms-table align-middle mb-0">
            <thead>
              <tr>
                <th class="sort-header" data-col="name" data-table="generalTable" style="white-space:nowrap;min-width:160px;">道具名稱<span class="sort-ind"></span></th>
                <th class="text-center sort-header" data-col="subcat" data-table="generalTable" style="white-space:nowrap;">子類別<span class="sort-ind"></span></th>
                <th class="text-center sort-header" data-col="qty" data-table="generalTable" style="white-space:nowrap;">數量<span class="sort-ind"></span></th>
                <th class="text-center sort-header" data-col="price" data-table="generalTable" style="white-space:nowrap;">價格<span class="sort-ind"></span></th>
                <th class="text-center sort-header" data-col="seller" data-table="generalTable" style="white-space:nowrap;">賣家<span class="sort-ind"></span></th>
                <th class="text-center sort-header" data-col="location" data-table="generalTable" style="white-space:nowrap;">位置<span class="sort-ind"></span></th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <th:block th:each="item, iterStat : ${items}"
                        th:if="${item.category.name() != 'EQUIPMENT'}">
                <tr th:replace="~{fragments/item-general-row :: generalRow(${item}, ${iterStat.count})}"></tr>
              </th:block>
            </tbody>
          </table>
          </div><!-- /overflow-x:auto -->
        </div>

      </div><!-- /hasResults -->

      </th:block><!-- /searched -->

    </div><!-- /col result -->
  </div><!-- /row -->
</div><!-- /container -->

<footer th:replace="~{fragments/layout :: footer}"></footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmydS3I+3s5HTMY2FGE8N4LhNm"
        crossorigin="anonymous"></script>

<!-- Trade code copy -->
<script th:src="@{/js/trade-code.js}"></script>

<!-- Equipment table column sort -->
<script>
(function () {
  function initSort(tableId) {
    var table = document.getElementById(tableId);
    if (!table) return;

    var currentCol = null;
    var ascending  = true;

    table.querySelectorAll('th.sort-header').forEach(function (th) {
      th.style.cursor = 'pointer';
      th.title = '點擊排序';
      th.addEventListener('click', function () {
        var col = this.dataset.col;
        if (currentCol === col) {
          ascending = !ascending;
        } else {
          currentCol = col;
          ascending  = true;
        }
        table.querySelectorAll('.sort-ind').forEach(function (s) { s.textContent = '\u00a0'; });
        this.querySelector('.sort-ind').textContent = ascending ? '▲' : '▼';
        sortTable(table, col, ascending);
      });
    });
  }

  function sortTable(table, col, asc) {
    var tbody = table.querySelector('tbody');
    var rows  = Array.from(tbody.querySelectorAll('tr'));
    rows.sort(function (a, b) {
      if (col === 'name' || col === 'subcat' || col === 'seller' || col === 'location') {
        var r = (a.dataset[col] || '').localeCompare(b.dataset[col] || '', 'zh-TW');
        return asc ? r : -r;
      }
      if (col === 'price') {
        var ga = parseInt(a.dataset.priceGroup) || 0;
        var gb = parseInt(b.dataset.priceGroup) || 0;
        if (ga !== gb) return ga - gb;
        var va = parseFloat(a.dataset.priceVal) || 0;
        var vb = parseFloat(b.dataset.priceVal) || 0;
        return asc ? va - vb : vb - va;
      }
      var av = parseFloat(a.dataset[col]) || 0;
      var bv = parseFloat(b.dataset[col]) || 0;
      return asc ? av - bv : bv - av;
    });
    rows.forEach(function (r) { tbody.appendChild(r); });
  }

  initSort('equipTable');
  initSort('generalTable');
})();
</script>

<!-- Keyword autocomplete -->
<script>
(function () {
  const input    = document.getElementById('keywordInput');
  const dropdown = document.getElementById('keywordDropdown');
  if (!input || !dropdown) return;

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function close() { dropdown.style.display = 'none'; }

  let timer;
  input.addEventListener('input', function () {
    clearTimeout(timer);
    var q = this.value.trim();
    if (q.length < 1) { close(); return; }
    timer = setTimeout(function () {
      fetch('/api/game-items?q=' + encodeURIComponent(q))
        .then(function (r) { return r.json(); })
        .then(function (items) {
          dropdown.innerHTML = '';
          if (!items.length) { close(); return; }
          items.forEach(function (item) {
            var a = document.createElement('a');
            a.className = 'dropdown-item small py-1';
            a.href = '#';
            a.innerHTML = '<strong>' + escHtml(item.name) + '</strong>';
            a.addEventListener('mousedown', function (e) {
              e.preventDefault();
              input.value = item.name;
              close();
            });
            dropdown.appendChild(a);
          });
          dropdown.style.display = 'block';
        })
        .catch(close);
    }, 200);
  });

  input.addEventListener('blur', function () { setTimeout(close, 150); });
  input.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });
})();
</script>

<!-- Dynamic filter panel -->
<script th:inline="javascript">
(function () {
  const catSelect        = document.getElementById('categorySelect');
  const equipFilters     = document.getElementById('equipmentFilters');
  const subCatConsumable = document.getElementById('subCatConsumable');
  const subCatOther      = document.getElementById('subCatOther');
  const currentCategory  = /*[[${searchRequest.category}]]*/ '';
  const currentEquipType = /*[[${searchRequest.equipType}]]*/ '';
  const currentEquipSubType = /*[[${searchRequest.equipSubType}]]*/ '';

  const EQUIP_SUB = {
    '防具': ['頭盔','帽子','上衣','套服','褲裙','手套','鞋子','披風','飾品'],
    '武器': ['單手劍','雙手劍','單手斧','雙手斧','單手棍','雙手棍',
             '短劍','指虎','拳套','矛','槍','弓','弩','火槍','短杖','長杖','盾牌'],
    '其他': ['坐騎','寵物裝備']
  };

  function fillEquipSubType(equipType, selected) {
    const subs = EQUIP_SUB[equipType] || [];
    const sel  = document.getElementById('equipSubTypeSelect');
    sel.innerHTML = '<option value="">-- 子分類：全部 --</option>'
      + subs.map(s => `<option value="${s}"${s === selected ? ' selected' : ''}>${s}</option>`).join('');
  }

  function hideAllSubCat() {
    subCatConsumable.style.display = 'none';
    subCatOther.style.display      = 'none';
    document.getElementById('subCatConsumableSelect').disabled = true;
    document.getElementById('subCatOtherSelect').disabled      = true;
  }

  function updateFilters(value) {
    equipFilters.style.display = 'none';
    hideAllSubCat();
    if (value === 'EQUIPMENT') {
      equipFilters.style.display = '';
    } else if (value === 'CONSUMABLE') {
      subCatConsumable.style.display = '';
      document.getElementById('subCatConsumableSelect').disabled = false;
    } else if (value === 'OTHER') {
      subCatOther.style.display = '';
      document.getElementById('subCatOtherSelect').disabled = false;
    }
    // DECORATIVE: 無子分類，不顯示任何選單
  }

  // Restore state on page load after a search
  updateFilters(currentCategory);
  if (currentEquipType) {
    fillEquipSubType(currentEquipType, currentEquipSubType);
  }

  catSelect.addEventListener('change', function () {
    updateFilters(this.value);
  });

  document.getElementById('equipTypeSelect').addEventListener('change', function () {
    fillEquipSubType(this.value, '');
  });
})();
</script>

</body>
</html>
