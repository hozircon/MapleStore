<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${isEdit} ? '編輯商品' : '新增商品')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container py-4" style="max-width: 720px;">

  <div class="d-flex align-items-center mb-3 gap-2">
    <a th:href="@{/admin}" class="btn btn-outline-secondary btn-sm">&larr; 返回後台</a>
    <h5 class="mb-0 fw-bold" th:text="${isEdit} ? '編輯商品' : '新增商品'">新增商品</h5>
  </div>

  <div class="card">
    <div class="card-body">

      <form th:action="${isEdit} ? @{/admin/items/{id}(id=${itemId})} : @{/admin/items}"
            th:object="${item}" method="post">

        <div class="row g-3">

          <!-- Game item search autocomplete -->
          <div class="col-12">
            <label class="form-label small fw-semibold">搜尋道具 <span class="text-danger">*</span></label>
            <div class="d-flex align-items-start gap-2">
              <div class="position-relative flex-grow-1">
                <input type="text" id="itemSearchInput" class="form-control form-control-sm"
                       placeholder="輸入道具名稱關鍵字，例：戒指、楓葉…" autocomplete="off" />
                <div id="itemSearchDropdown"
                     class="dropdown-menu w-100 shadow-sm p-0"
                     style="display:none; max-height:240px; overflow-y:auto; position:absolute; z-index:1050;"></div>
              </div>
              <!-- Item icon preview -->
              <div id="itemIconWrapper"
                   style="width:48px;height:48px;flex-shrink:0;border:1px solid #dee2e6;border-radius:6px;
                          background:#f8f9fa;display:flex;align-items:center;justify-content:center;overflow:hidden;">
                <img id="itemIconPreview"
                     src="" alt=""
                     style="display:none;width:40px;height:40px;image-rendering:pixelated;object-fit:contain;"
                     onerror="this.style.display='none';document.getElementById('itemIconPlaceholder').style.display='';" />
                <span id="itemIconPlaceholder" style="font-size:1.4rem;color:#ced4da;">🖼️</span>
              </div>
            </div>
            <div class="form-text text-muted">從清單中選擇道具，將自動填入 ID 與名稱</div>
          </div>

          <!-- Hidden itemId (auto-filled by autocomplete) -->
          <input type="hidden" id="itemIdHidden" th:field="*{itemId}" />
          <div th:if="${#fields.hasErrors('itemId')}" class="col-12">
            <div class="alert alert-danger py-1 px-2 small" th:errors="*{itemId}"></div>
          </div>

          <!-- Name (auto-filled, still editable) -->
          <div class="col-12">
            <label class="form-label small fw-semibold">商品名稱 <span class="text-danger">*</span>
              <span class="text-muted fw-normal">（選取道具後自動填入，可手動補充說明）</span>
            </label>
            <input type="text" id="itemNameInput" class="form-control form-control-sm"
                   th:field="*{name}" th:errorclass="is-invalid" maxlength="100"
                   placeholder="選擇道具後自動填入" />
            <div class="invalid-feedback" th:errors="*{name}"></div>
          </div>

          <!-- Category -->
          <div class="col-md-6">
            <label class="form-label small fw-semibold">大類 <span class="text-danger">*</span></label>
            <select id="adminCategorySelect" class="form-select form-select-sm"
                    th:field="*{category}" th:errorclass="is-invalid">
              <option value="">-- 選擇大類 --</option>
              <option th:each="cat : ${categories}"
                      th:value="${cat.name()}"
                      th:text="${cat.label}"></option>
            </select>
            <div class="invalid-feedback" th:errors="*{category}"></div>
          </div>

          <!-- Sub-category (shown for non-equipment) -->
          <div class="col-md-6" id="adminSubCatField">
            <label class="form-label small fw-semibold">子類別</label>
            <select class="form-select form-select-sm" id="adminSubCatSelect"
                    th:field="*{subCategory}">
              <option value="">―― 選擇子類別 ――</option>
              <!-- Options populated by JS based on selected category -->
            </select>
          </div>

          <!-- Equipment stat block (shown for EQUIPMENT) -->
          <div class="col-12" id="adminEquipStats" style="display:none;">

            <!-- 裝備種類 + 子分類 -->
            <div class="row g-2 mb-2">
              <div class="col-md-4">
                <label class="form-label small fw-semibold">種類</label>
                <select id="adminEquipTypeSelect" class="form-select form-select-sm"
                        th:field="*{equipType}">
                  <option value="">-- 選擇種類 --</option>
                  <option value="防具">防具</option>
                  <option value="武器">武器</option>
                  <option value="其他">其他（坐騎/寵物）</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label small fw-semibold">子分類</label>
                <select id="adminEquipSubTypeSelect" class="form-select form-select-sm"
                        th:field="*{equipSubType}">
                  <option value="">-- 選擇子分類 --</option>
                </select>
              </div>
            </div>

            <label class="form-label small fw-semibold d-block">裝備數值（選填）</label>
            <div class="row g-2">
              <div class="col-4 col-md-2">
                <input type="number" class="form-control form-control-sm"
                       th:field="*{strBonus}" placeholder="STR" min="0" />
              </div>
              <div class="col-4 col-md-2">
                <input type="number" class="form-control form-control-sm"
                       th:field="*{dexBonus}" placeholder="DEX" min="0" />
              </div>
              <div class="col-4 col-md-2">
                <input type="number" class="form-control form-control-sm"
                       th:field="*{intBonus}" placeholder="INT" min="0" />
              </div>
              <div class="col-4 col-md-2">
                <input type="number" class="form-control form-control-sm"
                       th:field="*{lukBonus}" placeholder="LUK" min="0" />
              </div>
              <div class="col-4 col-md-2">
                <input type="number" class="form-control form-control-sm"
                       th:field="*{atkBonus}" placeholder="ATK" min="0" />
              </div>
              <div class="col-4 col-md-2">
                <input type="number" class="form-control form-control-sm"
                       th:field="*{matkBonus}" placeholder="MATK" min="0" />
              </div>
              <div class="col-4 col-md-3">
                <input type="number" class="form-control form-control-sm"
                       th:field="*{scrollSlotsRemaining}" placeholder="剩餘卷次" min="0" />
              </div>
              <div class="col-12">
                <input type="text" class="form-control form-control-sm"
                       th:field="*{otherStats}" placeholder="其他素質，例：速度+10 HP+200" maxlength="200" />
              </div>
            </div>
          </div>

          <!-- Price type -->
          <div class="col-md-4">
            <label class="form-label small fw-semibold">貨幣類型 <span class="text-danger">*</span></label>
            <select class="form-select form-select-sm"
                    th:field="*{priceType}" th:errorclass="is-invalid">
              <option value="">-- 選擇貨幣 --</option>
              <option th:each="pt : ${priceTypes}"
                      th:value="${pt.name()}"
                      th:text="${pt.label}"></option>
            </select>
            <div class="invalid-feedback" th:errors="*{priceType}"></div>
          </div>

          <!-- Price value -->
          <div class="col-md-4">
            <label class="form-label small fw-semibold">標價 <span class="text-danger">*</span></label>
            <input type="number" class="form-control form-control-sm"
                   th:field="*{priceValue}" th:errorclass="is-invalid" min="0" />
            <div class="invalid-feedback" th:errors="*{priceValue}"></div>
          </div>

          <!-- Quantity -->
          <div class="col-md-4">
            <label class="form-label small fw-semibold">數量 <span class="text-danger">*</span></label>
            <input type="number" class="form-control form-control-sm"
                   th:field="*{quantity}" th:errorclass="is-invalid" min="1" value="1" />
            <div class="invalid-feedback" th:errors="*{quantity}"></div>
          </div>

          <!-- Seller name -->
          <div class="col-md-6">
            <label class="form-label small fw-semibold">賣家角色名稱 <span class="text-danger">*</span></label>
            <input type="text" class="form-control form-control-sm"
                   th:field="*{sellerName}" th:errorclass="is-invalid" maxlength="50" />
            <div class="invalid-feedback" th:errors="*{sellerName}"></div>
          </div>

          <!-- Warehouse char (admin only) -->
          <div class="col-md-6">
            <label class="form-label small fw-semibold">倉庫角色
              <span class="text-muted fw-normal">(非必填，僅後台顯示)</span>
            </label>
            <input type="text" class="form-control form-control-sm"
                   th:field="*{warehouseChar}" maxlength="30" placeholder="例：弓笭手01" />
          </div>

          <!-- Location -->
          <div class="col-md-6">
            <label class="form-label small fw-semibold">遊戲位置 <span class="text-danger">*</span></label>
            <input type="text" class="form-control form-control-sm"
                   th:field="*{location}" th:errorclass="is-invalid"
                   placeholder="例：CH1 FM03" maxlength="50" />
            <div class="invalid-feedback" th:errors="*{location}"></div>
          </div>

          <div class="col-12">
            <button type="submit" class="btn btn-primary"
                    th:text="${isEdit} ? '更新商品' : '新增商品'">新增商品</button>
            <a th:href="@{/admin}" class="btn btn-outline-secondary ms-2">取消</a>
          </div>

        </div><!-- /row -->
      </form>

    </div>
  </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmydS3I+3s5HTMY2FGE8N4LhNm"
        crossorigin="anonymous"></script>

<script th:inline="javascript">
(function () {
  /* ── Equip sub-type data ─────────────────────────────────────── */
  const EQUIP_SUB = {
    '防具': ['頭盔','帽子','上衣','套服','褲裙','手套','鞋子','披風','飾品'],
    '武器': ['單手劍','雙手劍','單手斧','雙手斧','單手棍','雙手棍',
             '短劍','指虎','拳套','矛','槍','弓','弩','火槍','短杖','長杖','盾牌'],
    '其他': ['坐騎','寵物裝備']
  };

  const SUBCAT_OPTIONS = {
    'CONSUMABLE': ['藥水', '卷軸', '技能書', '箭矢/飛鏢', '其他'],
    'OTHER':      ['礦石', '素材'],
    'DECORATIVE': []
  };

  function fillSubCatOptions(cat, selected) {
    const opts = SUBCAT_OPTIONS[cat] || [];
    const sel  = document.getElementById('adminSubCatSelect');
    if (!sel) return;
    sel.innerHTML = '<option value="">―― 選擇子類別 ――</option>'
      + opts.map(o => `<option value="${o}"${o === selected ? ' selected' : ''}>${o}</option>`).join('');
  }

  function fillEquipSubType(equipType, selected) {
    const subs = EQUIP_SUB[equipType] || [];
    const sel  = document.getElementById('adminEquipSubTypeSelect');
    sel.innerHTML = '<option value="">-- 選擇子分類 --</option>'
      + subs.map(s => `<option value="${s}"${s === selected ? ' selected' : ''}>${s}</option>`).join('');
  }

  /* ── Category ↔ stat-fields sync ────────────────────────────── */
  const catSel         = document.getElementById('adminCategorySelect');
  const equipStats     = document.getElementById('adminEquipStats');
  const subCatField    = document.getElementById('adminSubCatField');
  const currentCat     = /*[[${item.category}]]*/ '';
  const currentEquipType    = /*[[${item.equipType}]]*/ '';
  const currentEquipSubType = /*[[${item.equipSubType}]]*/ '';

  const currentSubCat  = /*[[${item.subCategory}]]*/ '';

  function syncFields(val) {
    if (val === 'EQUIPMENT') {
      equipStats.style.display  = '';
      subCatField.style.display = 'none';
    } else {
      equipStats.style.display  = 'none';
      subCatField.style.display = '';
      fillSubCatOptions(val, currentSubCat);
    }
  }
  syncFields(currentCat);
  // Restore equip sub-type options on edit
  if (currentEquipType) {
    fillEquipSubType(currentEquipType, currentEquipSubType);
  }
  catSel.addEventListener('change', function () { syncFields(this.value); });

  document.getElementById('adminEquipTypeSelect').addEventListener('change', function () {
    fillEquipSubType(this.value, '');
  });

  /* ── Game-item autocomplete ──────────────────────────────────── */
  const searchInput  = document.getElementById('itemSearchInput');
  const dropdown     = document.getElementById('itemSearchDropdown');
  const itemIdField  = document.getElementById('itemIdHidden');
  const nameField    = document.getElementById('itemNameInput');
  const iconPreview  = document.getElementById('itemIconPreview');
  const iconPlaceholder = document.getElementById('itemIconPlaceholder');

  function showItemIcon(itemId) {
    if (!itemId) {
      iconPreview.style.display = 'none';
      iconPreview.src = '';
      iconPlaceholder.style.display = '';
      return;
    }
    iconPreview.onerror = function () {
      this.style.display = 'none';
      iconPlaceholder.style.display = '';
    };
    iconPreview.onload = function () {
      this.style.display = '';
      iconPlaceholder.style.display = 'none';
    };
    iconPreview.src = '/images/items/' + itemId + '.png';
  }

  // Edit mode: pre-populate search box and show icon for existing item
  if (nameField.value) {
    searchInput.value = nameField.value;
    showItemIcon(itemIdField.value);
  }

  let debounce;
  searchInput.addEventListener('input', function () {
    clearTimeout(debounce);
    const q = this.value.trim();
    if (q.length < 1) { closeDropdown(); return; }
    debounce = setTimeout(() => fetchItems(q), 250);
  });

  function fetchItems(q) {
    fetch('/api/game-items?q=' + encodeURIComponent(q))
      .then(function(r) { return r.json(); })
      .then(function(items) {
        dropdown.innerHTML = '';
        if (!items.length) { closeDropdown(); return; }
        items.forEach(function(item) {
          const a = document.createElement('a');
          a.className = 'dropdown-item small py-1';
          a.href = '#';
          a.innerHTML =
            '<span style="font-size:.75em;color:#999;margin-right:.4em;">' + item.itemId + '</span>' +
            '<strong>' + escapeHtml(item.name) + '</strong>' +
            '<span class="badge bg-secondary ms-2" style="font-size:.65em;">' + item.wzCategory + '</span>';
          a.addEventListener('mousedown', function(e) {
            // mousedown fires before blur, so we can safely update values
            e.preventDefault();
            itemIdField.value = item.itemId;
            nameField.value   = item.name;
            searchInput.value = item.name;
            // Auto-fill big category from wzCategory
            const WZ_CAT_MAP = {
              'Eqp':     'EQUIPMENT',
              'Consume': 'CONSUMABLE',
              'Etc':     'OTHER',
              'Cash':    'DECORATIVE',
              'Ins':     'OTHER',
              'Pet':     'OTHER'
            };
            const mappedCat = WZ_CAT_MAP[item.wzCategory] || '';
            catSel.value = mappedCat;
            syncFields(mappedCat);
            // Auto-fill equip type / sub-type if GameItem has them
            if (item.equipType) {
              const equipTypeSel = document.getElementById('adminEquipTypeSelect');
              equipTypeSel.value = item.equipType;
              fillEquipSubType(item.equipType, item.equipSubType || '');
              const equipSubTypeSel = document.getElementById('adminEquipSubTypeSelect');
              if (item.equipSubType) equipSubTypeSel.value = item.equipSubType;
            }
            showItemIcon(item.itemId);
            // Auto-fill sub-category for non-equipment items
            if (item.subCategory) {
              const subSel = document.getElementById('adminSubCatSelect');
              if (subSel) subSel.value = item.subCategory;
            }
            closeDropdown();
          });
          dropdown.appendChild(a);
        });
        dropdown.style.display = 'block';
      })
      .catch(function() { closeDropdown(); });
  }

  function closeDropdown() { dropdown.style.display = 'none'; }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  searchInput.addEventListener('blur', function() {
    // slight delay so mousedown on dropdown item fires first
    setTimeout(closeDropdown, 150);
  });
  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeDropdown();
  });
})();
</script>

</body>
</html>
