<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('管理員登入')}"></head>
<body class="d-flex align-items-center justify-content-center bg-light" style="min-height: 100vh;">

<div class="card shadow-sm" style="width: 100%; max-width: 360px;">
  <div class="card-body p-4">
    <h5 class="card-title mb-4 text-center fw-bold">管理後台登入</h5>

    <div th:if="${param.error}" class="alert alert-danger py-2 small" role="alert">
      帳號或密碼錯誤，請重試。
    </div>
    <div th:if="${param.logout}" class="alert alert-success py-2 small" role="alert">
      已成功登出。
    </div>

    <form th:action="@{/login}" method="post">
      <div class="mb-3">
        <label for="username" class="form-label small fw-medium">帳號</label>
        <input type="text" id="username" name="username"
               class="form-control form-control-sm" required autofocus />
      </div>
      <div class="mb-4">
        <label for="password" class="form-label small fw-medium">密碼</label>
        <input type="password" id="password" name="password"
               class="form-control form-control-sm" required />
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-sm">登入</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmVswnfz5/cBjWFyKJfBeKHWlnkH"
        crossorigin="anonymous"></script>
</body>
</html>
