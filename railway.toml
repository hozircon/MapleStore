[build]
builder = "NIXPACKS"
buildCommand = "chmod +x gradlew && ./gradlew bootJar -x test"

[deploy]
startCommand = "java -Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8 -jar build/libs/ms-web-0.0.1-SNAPSHOT.jar --spring.profiles.active=prod"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
