<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  Fragment: equipmentRow(item)
  Usage:
    <div th:replace="~{fragments/item-equipment-row :: equipmentRow(${item})}"></div>
-->
<div th:fragment="equipmentRow(item)"
     class="card mb-2 shadow-sm equipment-row">
  <div class="card-body py-2 px-3">
    <div class="row align-items-center g-2">

      <!-- Item icon -->
      <div class="col-auto">
        <img th:src="@{/images/items/{id}.png(id=${item.itemId})}"
             th:alt="${item.name}"
             onerror="this.onerror=null;this.src='/images/items/0.png'"
             width="40" height="40"
             class="item-icon" />
      </div>

      <!-- Name -->
      <div class="col-3 col-md-2 fw-semibold small" th:text="${item.name}">商品名稱</div>

      <!-- Stats -->
      <div class="col">
        <div class="d-flex flex-wrap gap-1 stat-badges">
          <span class="badge bg-danger"  th:text="'STR ' + ${item.strBonusOrZero}"></span>
          <span class="badge bg-success" th:text="'DEX ' + ${item.dexBonusOrZero}"></span>
          <span class="badge bg-primary" th:text="'INT ' + ${item.intBonusOrZero}"></span>
          <span class="badge bg-warning text-dark" th:text="'LUK ' + ${item.lukBonusOrZero}"></span>
          <span class="badge bg-dark"   th:text="'ATK ' + ${item.atkBonusOrZero}"></span>
          <span class="badge bg-info text-dark"  th:text="'MATK ' + ${item.matkBonusOrZero}"></span>
          <span class="badge bg-secondary" th:text="'卷' + ${item.scrollSlotsRemainingOrZero} + '孔'"></span>
        </div>
      </div>

      <!-- Price -->
      <div class="col-auto text-end">
        <span class="price-badge fw-bold small"
              th:classappend="${item.priceType.name() == 'MESO' ? 'text-warning' :
                               (item.priceType.name() == 'CS'   ? 'text-info'   : 'text-success')}">
          <span th:text="${item.priceType.name()}"></span>
          <span th:text="${#numbers.formatInteger(item.priceValue, 0, 'COMMA')}"></span>
        </span>
      </div>

      <!-- Seller -->
      <div class="col-auto text-muted small">
        <span th:text="${item.sellerName}"></span>
        &bull;
        <span th:text="${item.location}"></span>
      </div>

      <!-- Copy button + fallback input -->
      <div class="col-auto">
        <button type="button" class="btn btn-outline-secondary btn-sm copy-btn"
                th:data-trade-code="${'【交易暗號】' + item.name + ' / ' +
                                     #numbers.formatInteger(item.priceValue,0,'COMMA') + ' ' +
                                     item.priceType.name() + ' / ' + item.location}">
          複製暗號
        </button>
        <input type="text" class="form-control form-control-sm trade-fallback mt-1"
               style="display:none; max-width:220px;"
               readonly
               th:value="${'【交易暗號】' + item.name + ' / ' +
                           #numbers.formatInteger(item.priceValue,0,'COMMA') + ' ' +
                           item.priceType.name() + ' / ' + item.location}" />
      </div>

    </div><!-- /row -->
  </div>
</div>

</body>
</html>
