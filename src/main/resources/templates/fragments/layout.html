<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(pageTitle)">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${pageTitle} + ' | MS 交易展示站'">MS 交易展示站</title>
  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <link rel="stylesheet" th:href="@{/css/custom.css}" />
</head>

<nav th:fragment="navbar" class="navbar navbar-dark bg-dark px-3">
  <a class="navbar-brand fw-bold" th:href="@{/}">🍁 MS 交易展示站</a>
  <a class="btn btn-sm btn-outline-light" th:href="@{/admin}">管理後台</a>
</nav>

<footer th:fragment="footer" class="text-center text-muted py-3 mt-4 border-top small">
  &copy; 2026 MS 交易展示站 &mdash; 非官方私服社群工具
</footer>

<!--
  Usage in pages:
    <html th:replace="~{fragments/layout :: page(~{::title}, ~{::main})}">
  
  Or use individual fragments:
    <head th:replace="~{fragments/layout :: head('Page Title')}"></head>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <footer th:replace="~{fragments/layout :: footer}"></footer>
-->
</html>
