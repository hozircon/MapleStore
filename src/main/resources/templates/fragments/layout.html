<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(pageTitle)">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${pageTitle} + ' | MS 交易展示站'">MS 交易展示站</title>
  <!-- Google Fonts: Noto Sans TC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <link rel="stylesheet" th:href="@{/css/custom.css}" />
</head>

<nav th:fragment="navbar" class="navbar ms-navbar d-flex justify-content-between align-items-center">
  <a class="navbar-brand" th:href="@{/}">數柴ㄉ神秘谷道具資訊展示站</a>
  <div class="d-flex align-items-center gap-2">
    <a class="btn-nav-admin" th:href="@{/admin}">管理後台</a>
    <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()" class="m-0">
      <button type="submit" class="btn btn-sm btn-outline-secondary">登出</button>
    </form>
  </div>
</nav>

<footer th:fragment="footer" class="text-center ms-footer py-3 mt-4">
  &copy; 2026 神秘谷道具數位展示 &mdash; 
</footer>

<!--
  Usage in pages:
    <html th:replace="~{fragments/layout :: page(~{::title}, ~{::main})}">
  
  Or use individual fragments:
    <head th:replace="~{fragments/layout :: head('Page Title')}"></head>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <footer th:replace="~{fragments/layout :: footer}"></footer>
-->
</html>
